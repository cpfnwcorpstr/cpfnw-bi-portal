*{box-sizing:border-box;margin:0;padding:0}
body{background:#F2F4F8;font-family:'CPF Imm Sook',sans-serif;min-height:100vh;x}

.header{background:#fff;padding:0 28px;display:flex;align-items:stretch;justify-content:space-between;border-bottom:1px solid #E0E6F0;height:64px;position:sticky;top:0;z-index:100}
.brand-wrap{display:flex;align-items:center;border-right:1px solid #E0E6F0;padding-right:28px;margin-right:28px}
.brand-logo{width:36px;height:36px;background:linear-gradient(135deg,#0055CC,#0EA5A0);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-right:10px;flex-shrink:0}
.brand-logo svg{width:20px;height:20px}
.brand-name{font-family:'CPF Imm Sook',sans-serif;font-weight:700;font-size:26px;color:#0A1628;letter-spacing:.01em;line-height:1}
.brand-sub{font-size:11px;color:#94A3B8;font-weight:400;letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.header-mid{flex:1;display:flex;align-items:center;gap:10px;min-width:0}
.search-pill{display:flex;align-items:center;background:#F2F4F8;border:1.5px solid #DDE3EE;border-radius:40px;padding:0 16px;gap:10px;height:40px;flex:1;min-width:0;transition:border-color .2s,box-shadow .2s}
.search-pill:focus-within{border-color:#0055CC;box-shadow:0 0 0 3px #0055CC14}
.search-pill input{background:none;border:none;outline:none;font-family:'CPF Imm Sook',sans-serif;font-size:15px;color:#0A1628;width:100%}
.search-pill input::placeholder{color:#A0AEBF}
.search-pill .si{color:#A0AEBF;font-size:15px}
.header-right{display:flex;align-items:center;gap:8px}
.date-chip{background:#EEF4FF;border:1px solid #C7D9F5;border-radius:8px;padding:6px 12px;font-size:13px;color:#2563EB;font-weight:600;white-space:nowrap;font-family:'CPF Imm Sook',sans-serif}
.count-chip{background:#F0FDF4;border:1px solid #BBF7D0;border-radius:8px;padding:6px 12px;font-size:13px;color:#16A34A;font-weight:600;font-family:'CPF Imm Sook',sans-serif}

.body{padding:28px 28px 40px}
.top-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;position:sticky;top:64px;z-index:90;background:#F2F4F8;padding:14px 0 12px;margin-left:0;margin-right:0}
.page-h{font-family:'CPF Imm Sook',sans-serif;font-weight:700;font-size:30px;color:#0A1628;line-height:1;letter-spacing:-.01em}
.page-h span{color:#0055CC}
.filter-row{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{font-family:'CPF Imm Sook',sans-serif;font-size:15px;font-weight:600;padding:8px 22px;border-radius:20px;border:1.5px solid #DDE3EE;background:#fff;color:#64748B;cursor:pointer;transition:all .15s;letter-spacing:.02em}
.filter-btn.active{background:#0A1628;border-color:#0A1628;color:#fff}
.filter-btn:hover:not(.active){border-color:#0055CC;color:#0055CC}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}

.card{background:#fff;border:1.5px solid #E0E6F0;border-radius:16px;cursor:pointer;transition:all .2s ease;display:flex;flex-direction:column;overflow:hidden;text-decoration:none}
.card:active{transform:translateY(-1px)}
.card-accent{height:5px;width:100%;flex-shrink:0}
.card-inner{padding:18px 18px 14px;flex:1;display:flex;flex-direction:column;gap:14px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.icon-box{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;border:1.5px solid transparent}
.cat-badge{font-family:'CPF Imm Sook',sans-serif;font-size:11px;font-weight:600;color:#94A3B8;letter-spacing:.04em;background:#F2F4F8;border-radius:6px;padding:3px 8px;white-space:nowrap;align-self:flex-start;margin-top:2px}
.card-title{font-family:'CPF Imm Sook',sans-serif;font-weight:700;font-size:23px;color:#0A1628;line-height:1.3;margin-bottom:3px}
.card-sub{font-size:15px;color:#7A8799;line-height:1.5;font-family:'CPF Imm Sook',sans-serif}
.card-foot{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 12px;border-top:1px solid #F2F4F8}
.owner-row{display:flex;align-items:center;gap:6px}
.avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0;font-family:'CPF Imm Sook',sans-serif}
.owner-name{font-size:12px;color:#94A3B8;font-family:'CPF Imm Sook',sans-serif}
.open-tag{font-family:'CPF Imm Sook',sans-serif;font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px;transition:gap .15s}
.card:hover .open-tag{gap:7px}

.add-card{background:transparent;border:2px dashed #DDE3EE;border-radius:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:170px;transition:all .2s;color:#94A3B8;padding:20px}
.add-card:hover{border-color:#0055CC;color:#0055CC;background:#F5F9FF}
.add-icon{width:44px;height:44px;border-radius:12px;border:2px dashed currentColor;display:flex;align-items:center;justify-content:center;font-size:22px;transition:transform .2s}
.add-card:hover .add-icon{transform:scale(1.1)}
.add-label{font-family:'CPF Imm Sook',sans-serif;font-size:14px;font-weight:600;letter-spacing:.02em}
.add-sublabel{font-size:12px;color:#A0AEBF;margin-top:2px;text-align:center;font-family:'CPF Imm Sook',sans-serif}

.empty{grid-column:1/-1;text-align:center;padding:60px;color:#94A3B8;font-family:'CPF Imm Sook',sans-serif;font-size:16px}
</style>
</head>

      <input type="text" placeholder="ค้นหา dashboard..." id="searchInput" oninput="filterCards(this.value)">
    </div>
    <div class="count-chip" id="countChip" style="flex-shrink:0;margin-left:8px"></div>
  </div>
  <div class="header-right">
  </div>
</div>

<div class="body">
  <div class="top-row">
    <div class="page-h">รายงาน<span>ทั้งหมด</span></div>
    <div class="filter-row" id="filterRow"></div>
  </div>
  <div class="grid" id="cardGrid"></div>
</div>

<script>
// ============================================================
//  แก้ไขข้อมูล dashboard ได้ที่นี่
//  - title   : ชื่อ dashboard
//  - sub     : คำอธิบายสั้นๆ
//  - owner   : ชื่อเจ้าของ
//  - icon    : emoji icon
//  - cat     : หมวดหมู่ (ใช้สำหรับ filter)
//  - url     : ลิงก์ Power BI report
//  - palette : 0=blue, 1=teal, 2=amber
// ============================================================
const dashboards = [
  { title:"P&L Simplify Summary",    sub:"Sales, Volume (Ton) & Net Profit<br>3 Views (Export, Branch, Consolidated)", owner:"Nam Wan",           icon:"📋", cat:"Finance", url:"https://app.powerbi.com/groups/40a2547c-7ab1-4d5a-b7a4-ef72ad368ab1/reports/e59dec58-1cda-4fad-b601-7899d6dc5ca9/802b7304466d2069a547?experience=power-bi", palette:0 },
  { title:"End Month Estimation",     sub:"Sales & Volume (Ton) — Updated Weekly<br>Latest data, refreshed every Monday",  owner:"Moo Deng",          icon:"🗓️", cat:"Finance", url:"https://app.powerbi.com/groups/40a2547c-7ab1-4d5a-b7a4-ef72ad368ab1/reports/ce6a8876-6c67-4f7c-833b-f9a8f9893b1b/fa3bd9ff3714680463c0?experience=power-bi", palette:1 },
  { title:"Customer Performance",     sub:"Consolidated",                                                                   owner:"Moo Deng",          icon:"🤝", cat:"Finance", url:"https://app.powerbi.com/groups/40a2547c-7ab1-4d5a-b7a4-ef72ad368ab1/reports/ce6a8876-6c67-4f7c-833b-f9a8f9893b1b/bea1d3b99223dc3ab7bd?experience=power-bi", palette:2 },
  { title:"Branch KPI",               sub:"Branch Performance",                                                             owner:"Nam Wan",           icon:"🏬", cat:"KPI",     url:"https://app.powerbi.com/groups/40a2547c-7ab1-4d5a-b7a4-ef72ad368ab1/reports/c189074b-1dec-4b2c-a885-920599f2d7e3/11c971c3367db018dc2d?experience=power-bi", palette:3 },
  { title:"Sale Team KPI",            sub:"Sale Team Performance",                                                          owner:"Nam Wan",           icon:"👨‍👩‍👧‍👦", cat:"KPI",     url:"https://app.powerbi.com/groups/40a2547c-7ab1-4d5a-b7a4-ef72ad368ab1/reports/263756b7-8a3f-4340-a650-8d3bfa41d007/66c31c368c402635db86?experience=power-bi", palette:4 },
  { title:"Country Champions",        sub:"Champions Score Board",                                                          owner:"Nam Wan",           icon:"🥇", cat:"KPI",     url:"https://app.powerbi.com/groups/40a2547c-7ab1-4d5a-b7a4-ef72ad368ab1/reports/d875c858-03f9-4cd6-a75c-510a23c85518/4f6949bc02538ec2d7eb?experience=power-bi", palette:5 },
  { title:"Corporate KPI",            sub:"CPFNW KPI",                                                                     owner:"Strategy ส่วนกลาง", icon:"🎯", cat:"KPI",     url:"https://app.powerbi.com/groups/7faf2b87-e8ab-48ce-8d9f-a275b7a29e4c/reports/c2b25d86-0a21-4e8a-afc9-ce91b4651822/39fc2944195624717e60?experience=power-bi", palette:6 },
  { title:"Demand Review",            sub:"Data from Team Demand",                                                          owner:"Moo Deng",          icon:"📦", cat:"Demand",  url:"https://app.powerbi.com/groups/40a2547c-7ab1-4d5a-b7a4-ef72ad368ab1/reports/03bbcfab-b9b1-4c4a-9094-1ee42c20a57c/fda7454180d79016ee00?experience=power-bi", palette:7 },
  { title:"Economics Factors",        sub:"GDP, Exchange Rate",                                                             owner:"Moo Deng",          icon:"🌍", cat:"Others",  url:"https://app.powerbi.com/groups/40a2547c-7ab1-4d5a-b7a4-ef72ad368ab1/reports/03f63542-63b9-4cda-bf38-87af9e1a7dde/fc30ef097ca7523ae6a2?experience=power-bi", palette:8 },
];

// ============================================================
//  เพิ่ม dashboard ใหม่: copy 1 บรรทัดด้านบน paste ต่อก่อน ];
// ============================================================

const palettes = [
  { accent:"#6C8EBF", icon:"#DDEEFF", iconBorder:"#B8D4F0", open:"#4A72A8" },
  { accent:"#6BAF8E", icon:"#D8F2E6", iconBorder:"#AADDC4", open:"#4A9470" },
  { accent:"#C47E8A", icon:"#FFE4E9", iconBorder:"#F5BFCA", open:"#A85F6B" },
  { accent:"#8A7EC4", icon:"#E8E4FF", iconBorder:"#C9C2F5", open:"#6B5FAD" },
  { accent:"#C49A5A", icon:"#FFF2D8", iconBorder:"#F5D89A", open:"#A87C3A" },
  { accent:"#5AACBF", icon:"#D8F4FF", iconBorder:"#A8DFF0", open:"#3A8FA8" },
  { accent:"#BF7A5A", icon:"#FFE8D8", iconBorder:"#F5C8A8", open:"#A85A3A" },
  { accent:"#7ABF6C", icon:"#E4FFD8", iconBorder:"#BEF0AA", open:"#5AA84A" },
  { accent:"#BF8EC4", icon:"#F5E4FF", iconBorder:"#DFB8F5", open:"#A86EAD" },
];
const ownerColors = { "Nam Wan":"#6C8EBF", "Moo Deng":"#6BAF8E", "Strategy ส่วนกลาง":"#8A7EC4" };
const ownerEmails = {
  "Nam Wan":           "Nartrapee.kak@cpf.co.th",
  "Moo Deng":          "Chonkanok.hoy@cpf.co.th",
  "Strategy ส่วนกลาง": "",
};

function initials(name){ return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() }

let activeCat = "All";
const cats = ["All",...[...new Set(dashboards.map(d=>d.cat))]];

function renderFilters(){
  const row = document.getElementById('filterRow');
  row.innerHTML = '';
  cats.forEach(c => {
    const b = document.createElement('button');
    b.className = 'filter-btn' + (c===activeCat?' active':'');
    b.textContent = c;
    b.onclick = () => { activeCat=c; renderFilters(); renderCards(document.getElementById('searchInput').value); };
    row.appendChild(b);
  });
}

function renderCards(q){
  let list = activeCat==="All" ? [...dashboards] : dashboards.filter(d=>d.cat===activeCat);
  if(q) list = list.filter(d =>
    d.title.toLowerCase().includes(q.toLowerCase()) ||
    d.sub.toLowerCase().includes(q.toLowerCase()) ||
    d.cat.toLowerCase().includes(q.toLowerCase())
  );
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  document.getElementById('countChip').textContent = list.length + ' dashboard' + (list.length!==1?'s':'');
  if(list.length===0){ grid.innerHTML='<div class="empty">ไม่พบ dashboard ที่ค้นหา</div>'; return; }
  list.forEach(d => {
    const p = palettes[d.palette]||palettes[0];
    const av = ownerColors[d.owner]||'#64748B';
    const a = document.createElement('a');
    a.className = 'card';
    a.href = d.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.onmouseenter = () => {
      a.style.borderColor = p.accent;
      a.style.boxShadow = `0 12px 32px ${p.accent}28`;
      a.style.transform = 'translateY(-3px)';
    };
    a.onmouseleave = () => {
      a.style.borderColor = '';
      a.style.boxShadow = '';
      a.style.transform = '';
    };
    a.innerHTML = `
      <div class="card-accent" style="background:${p.accent}"></div>
      <div class="card-inner">
        <div class="card-top">
          <div class="icon-box" style="background:${p.icon};border-color:${p.iconBorder}">${d.icon}</div>
          <div class="cat-badge">${d.cat}</div>
        </div>
        <div>
          <div class="card-title">${d.title}</div>
          <div class="card-sub">${d.sub}</div>
        </div>
      </div>
      <div class="card-foot">
        <div class="owner-row">
          <div class="avatar" style="background:${av}">${initials(d.owner)}</div>
          <a class="owner-name owner-link" href="${ownerEmails[d.owner] ? 'mailto:'+ownerEmails[d.owner]+'?subject='+encodeURIComponent('[สอบถาม BI] Dashboard: '+d.title) : '#'}" onclick="${ownerEmails[d.owner] ? 'event.stopPropagation()' : 'event.preventDefault();event.stopPropagation()'}" style="color:#94A3B8;text-decoration:none;${ownerEmails[d.owner] ? 'border-bottom:1px dashed #CBD5E1;cursor:pointer;' : ''}transition:color .15s" ${ownerEmails[d.owner] ? `onmouseenter="this.style.color='${av}'" onmouseleave="this.style.color='#94A3B8'"` : ''}>${d.owner}</a>
        </div>
        <div class="open-tag" style="color:${p.open}">เปิด <span>→</span></div>
      </div>`;
    grid.appendChild(a);
  });
  const add = document.createElement('div');
  add.className = 'add-card';
  add.innerHTML = `
    <div class="add-icon">+</div>
    <div class="add-label">เพิ่ม Dashboard</div>
    <div class="add-sublabel">แก้ไขในไฟล์ HTML<br>แล้ว refresh หน้านี้</div>`;
  grid.appendChild(add);
}

function filterCards(q){ renderCards(q); }

renderFilters();
renderCards('');


</script>
</body>
</html>
